name: Update rankings

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update ranking data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_rankings.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit updated rankings
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update academic research skill rankings"
          file_pattern: README.md data/rankings.json data/rankings.js data/rankings.csv data/history/*.json

      - name: Redeploy GitHub Pages
        # The auto-commit uses GITHUB_TOKEN, whose pushes do NOT trigger other
        # `on: push` workflows — so Pages would otherwise serve stale data.
        # Re-trigger the Pages deploy explicitly when data changed.
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main',
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Ranking update failed on ${new Date().toISOString().slice(0, 10)}`,
              body: `The daily update workflow failed. See [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ["auto-update-failure"]
            });
